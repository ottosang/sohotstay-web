<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펜션 객실 및 투숙 관리 시스템 (설정 포함)</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --danger-color: #dc2626;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --info-color: #2563eb;
            --bg-color: #f3f4f6;
            --sidebar-bg: #1f2937;
            --card-border: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { display: flex; background-color: var(--bg-color); color: #111827; height: 100vh; overflow: hidden; }

        /* 1. 패스워드 스크린 암호 잠금 */
        #lock-screen {
            position: fixed; top:0; left:0; width:100vw; height:100vh; background:#111827;
            display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; color:white;
        }
        .lock-box { background:#1f2937; padding:40px; border-radius:12px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.3); }
        .lock-box input { padding:12px; width:200px; text-align:center; font-size:1.5rem; letter-spacing:8px; border:none; border-radius:6px; margin:20px 0; outline:none; }

        /* 레이아웃 구조 */
        .sidebar { width: 240px; background-color: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; }
        .sidebar .logo { padding: 20px; font-size: 1.1rem; font-weight: bold; border-bottom: 1px solid #374151; }
        .sidebar-menu { list-style: none; padding: 15px 10px; }
        .sidebar-menu li { padding: 12px 16px; border-radius: 8px; cursor: pointer; color: #9ca3af; margin-bottom: 4px; font-size: 0.9rem; }
        .sidebar-menu li:hover, .sidebar-menu li.active { background-color: var(--primary-color); color: #fff; font-weight: 600; }

        .main-content { flex: 1; padding: 24px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }

        /* 대시보드 전용 상단 스코어보드 */
        .dashboard-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .summary-card { background: white; padding: 16px; border-radius: 8px; border: 1px solid var(--card-border); }
        .summary-card .title { font-size: 0.85rem; color: #6b7280; font-weight: 500; }
        .summary-card .value { font-size: 1.8rem; font-weight: bold; margin-top: 4px; }
        .summary-card .value span { font-size: 1rem; font-weight: normal; color: #4b5563; }

        /* 대시보드 메인 그리드 */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start; }
        
        /* 객실 현황판 구역 */
        .room-status-area { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--card-border); }
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 16px; }
        
        /* 스크린샷 2026-06-23 오후 3.21.24.jpg 기반 객실 카드 디자인 */
        .room-card { background: white; border: 2px solid #e5e7eb; border-radius: 10px; padding: 14px; position: relative; cursor: pointer; transition: all 0.2s; }
        .room-card.selected { border-color: var(--danger-color); box-shadow: 0 0 0 1px var(--danger-color); }
        .room-card .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .room-card .room-name { font-size: 1.3rem; font-weight: bold; }
        .room-card .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        
        /* 객실 상태별 테두리 및 배지 색상 매칭 */
        .room-card.status-available { border-color: #e5e7eb; }
        .room-card.status-available .status-badge { background: #f3f4f6; color: #4b5563; }
        .room-card.status-dirty { border-color: #fde68a; background: #fffbeb; }
        .room-card.status-dirty .status-badge { background: #f59e0b; color: white; }
        .room-card.status-occupied { border-color: #a7f3d0; background: #f0fdf4; }
        .room-card.status-occupied .status-badge { background: #10b981; color: white; }

        .room-details { font-size: 0.8rem; color: #6b7280; border-bottom: 1px dashed #e5e7eb; padding-bottom: 8px; margin-bottom: 8px; }
        .room-details div { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .room-btn-group { display: flex; gap: 4px; }
        .room-btn-group button { flex: 1; padding: 4px; font-size: 0.75rem; border: 1px solid #d1d5db; background: white; border-radius: 4px; cursor: pointer; }
        .room-btn-group button:hover { background: #f9fafb; }

        /* 스크린샷 2026-06-23 오후 3.21.33.jpg 기반 우측 객실 제어 사이드 패널 */
        .control-panel { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--card-border); position: sticky; top: 20px; }
        .panel-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #4b5563; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; }
        
        .btn-action { width: 100%; padding: 12px; background: #b91c1c; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.95rem; margin-top: 10px; }
        .btn-action:hover { background: #991b1b; }

        /* 하단 내역 테이블 명단 스타일 */
        .table-area { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--card-border); margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; }
        th, td { padding: 10px 14px; border-bottom: 1px solid #e5e7eb; font-size: 0.85rem; }
        th { background: #f9fafb; color: #4b5563; font-weight: 600; }

        /* 설정 페이지 폼 전용 스타일 */
        .config-section { background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--card-border); }
        .btn-save { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save:hover { background: var(--primary-hover); }
    </style>
</head>
<body>

    <!-- 1. 패스워드 스크린 잠금 -->
    <div id="lock-screen">
        <div class="lock-box">
            <h2>시스템 잠금 해제</h2>
            <p style="color:#9ca3af; font-size:0.85rem; margin-top:4px;">프로그램 진입 비밀번호를 입력하세요.</p>
            <input type="password" id="sys-password" maxlength="4" placeholder="••••" oninput="checkPassword()">
            <div id="lock-msg" style="color:var(--danger-color); font-size:0.85rem; height:18px;"></div>
        </div>
    </div>

    <!-- 좌측 공통 대형 메뉴 바 -->
    <nav class="sidebar">
        <div class="logo">ioInOut 시스템</div>
        <ul class="sidebar-menu">
            <li id="menu-dash" class="active" onclick="switchPage('dashboard')">🏠 객실 및 투숙 관리</li>
            <li id="menu-config" onclick="switchPage('config')">⚙️ 시스템 환경 설정</li>
        </ul>
    </nav>

    <!-- 2. 대시보드 운영 화면 (스크린샷 내용 이식 완료) -->
    <main id="page-dashboard" class="main-content active">
        <!-- 상단 스코어 현황판 판넬 -->
        <div class="dashboard-summary">
            <div class="summary-card"><div class="title">재실/운영중</div><div class="value" id="count-occupied" style="color:var(--success-color)">2<span> 실</span></div></div>
            <div class="summary-card"><div class="title">예약가능 (공실)</div><div class="value" id="count-available" style="color:var(--info-color)">4<span> 실</span></div></div>
            <div class="summary-card"><div class="title">정비/점검 필요</div><div class="value" id="count-dirty" style="color:var(--warning-color)">2<span> 실</span></div></div>
            <div class="summary-card"><div class="title">오늘 정산 매출</div><div class="value" style="color:#111827">565,000<span> 원</span></div></div>
        </div>

        <div class="dashboard-grid">
            <!-- 좌측 객실 현황 바둑판 그리드 -->
            <div class="room-status-area">
                <h3 style="font-size:1rem; font-weight:bold;">객실 투숙 현황</h3>
                <div class="room-grid" id="dynamic-room-container">
                    <!-- 자바스크립트에 의해 실시간 세팅 설정된 방들이 드로우됩니다. -->
                </div>
            </div>

            <!-- 우측 선택 객실 제어 패널 -->
            <div class="control-panel">
                <div class="panel-title">선택 객실 제어: <span id="selected-room-title" style="color:var(--primary-color)">-</span></div>
                <div class="form-group">
                    <label>고객 연락처</label>
                    <input type="text" id="ctrl-phone" placeholder="01012345678">
                </div>
                <div class="form-group">
                    <label>객실 수동 비밀번호 매핑</label>
                    <input type="text" id="ctrl-pwd" placeholder="수동 비밀번호 설정">
                </div>
                <div class="form-group">
                    <label>투숙 기간 지정 (체크인/체크아웃)</label>
                    <div style="display:flex; gap:4px; align-items:center;">
                        <input type="date" id="ctrl-start" style="padding:4px; font-size:0.8rem;">
                        <span>~</span>
                        <input type="date" id="ctrl-end" style="padding:4px; font-size:0.8rem;">
                    </div>
                </div>
                <div class="form-group">
                    <label>결제 상태 및 수단</label>
                    <select id="ctrl-pay">
                        <option>⚠️ 미결제 (현장 후불 정산)</option>
                        <option>💳 신용카드 정산 완료</option>
                        <option>💵 현금정산 완료</option>
                    </select>
                </div>
                <button class="btn-action" onclick="applyRoomControl()">입실 처리 및 예약 확정</button>
            </div>
        </div>

        <!-- 하단 실시간 투숙 명단 명세서 구역 -->
        <div class="table-area">
            <h3 style="font-size:0.95rem; font-weight:bold; margin-bottom:8px;">현재 투숙/이용 중 객실 명단</h3>
            <table>
                <thead>
                    <tr><th>객실</th><th>고객 연락처</th><th>단위</th><th>상태</th><th>투숙 기간</th><th>관리</th></tr>
                </thead>
                <tbody id="live-guest-tbody">
                    <!-- 기본 투숙 가상 샘플 로드 데이터 -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- 3. 시스템 환경 설정 페이지 (수량 및 호실 이름 제어) -->
    <main id="page-config" class="main-content">
        <div class="config-section">
            <h2 style="font-size:1.3rem; margin-bottom:20px; border-bottom:2px solid #e5e7eb; padding-bottom:10px;">⚙️ 시스템 환경 설정</h2>
            
            <div class="form-group" style="max-width: 500px;">
                <label style="font-size:0.9rem; font-weight:bold;">객실 이름 구성 (콤마 ',' 기호로 구분)</label>
                <p style="font-size:0.8rem; color:#6b7280; margin-bottom:8px;">생성하고자 하는 호실 이름들을 차례대로 적어주세요. 수량은 자동 계산됩니다.</p>
                <input type="text" id="config-room-names" value="101,102,103,104,105,106,107,108" style="font-size:1rem; padding:10px;">
            </div>

            <div class="form-group" style="max-width: 500px; margin-top:20px;">
                <label style="font-size:0.9rem; font-weight:bold;">프로그램 진입 잠금 비밀번호 변경</label>
                <input type="password" id="config-sys-pwd" value="0880" maxlength="4" style="font-size:1rem; padding:10px; width:150px; text-align:center;">
            </div>

            <button class="btn-save" style="margin-top:20px;" onclick="saveSystemConfiguration()">환경설정 적용 및 저장</button>
        </div>
    </main>

    <script>
        // 초기 기본 메모리 세팅 데이터 가상 DB 정의
        let systemPassword = "0880";
        let roomsData = {
            "101": { status: "available", period: "-", phone: "-", pwd: "4826", price: 0 },
            "102": { status: "dirty", period: "-", phone: "-", pwd: "9153", price: 0 },
            "103": { status: "available", period: "-", phone: "-", pwd: "", price: 0 },
            "104": { status: "occupied", period: "2026-06-01 ~ 2026-06-04", phone: "김상훈 01066450220", pwd: "5571", price: 165000 },
            "105": { status: "available", period: "-", phone: "-", pwd: "", price: 0 },
            "106": { status: "available", period: "-", phone: "-", pwd: "", price: 0 },
            "107": { status: "dirty", period: "-", phone: "-", pwd: "", price: 0 },
            "108": { status: "occupied", period: "2026-06-11 ~ 2026-06-16", phone: "이수현 010-6534-2520", pwd: "3829", price: 400000 }
        };
        let currentSelectedRoom = null;

        // 1. 진입 비밀번호 처리 검증 함수
        function checkPassword() {
            const inputVal = document.getElementById('sys-password').value;
            const msg = document.getElementById('lock-msg');
            if(inputVal.length === 4) {
                if(inputVal === systemPassword) {
                    document.getElementById('lock-screen').style.display = 'none';
                } else {
                    msg.innerText = "❌ 비밀번호가 일치하지 않습니다.";
                    document.getElementById('sys-password').value = "";
                }
            }
        }

        // 페이지 네비게이션 교체 스위칭 
        function switchPage(page) {
            document.querySelectorAll('.main-content').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.sidebar-menu li').forEach(l => l.classList.remove('active'));
            
            if(page === 'dashboard') {
                document.getElementById('page-dashboard').classList.add('active');
                document.getElementById('menu-dash').classList.add('active');
                renderDashboard();
            } else {
                document.getElementById('page-config').classList.add('active');
                document.getElementById('menu-config').classList.add('active');
            }
        }

        // 2. 환경 설정 저장 및 대시보드 반영 트리거 로직
        function saveSystemConfiguration() {
            const rawNames = document.getElementById('config-room-names').value;
            systemPassword = document.getElementById('config-sys-pwd').value;
            
            const nameArray = rawNames.split(',').map(s => s.trim()).filter(s => s !== "");
            
            // 기존 데이터 보존 처리 및 신규 추가 객실 초기화 매핑
            let newRoomsData = {};
            nameArray.forEach(name => {
                if(roomsData[name]) {
                    newRoomsData[name] = roomsData[name];
                } else {
                    newRoomsData[name] = { status: "available", period: "-", phone: "-", pwd: "", price: 0 };
                }
            });
            roomsData = newRoomsData;
            
            alert("⚙️ 새로운 환경 설정 정보가 대시보드 레이아웃에 정상 반영되었습니다.");
            switchPage('dashboard');
        }

        // 3. 이미지 대시보드 렌더링 코어 처리부 
        function renderDashboard() {
            const container = document.getElementById('dynamic-room-container');
            container.innerHTML = "";

            let countOccupied = 0;
            let countAvailable = 0;
            let countDirty = 0;

            Object.keys(roomsData).forEach(roomNum => {
                const info = roomsData[roomNum];
                
                // 통계 합산 계산기
                if(info.status === 'occupied') countOccupied++;
                if(info.status === 'available') countAvailable++;
                if(info.status === 'dirty') countDirty++;

                let badgeText = "예약가능";
                if(info.status === 'dirty') badgeText = "정비중";
                if(info.status === 'occupied') badgeText = "이용중";

                // 카드 엘리먼트 돔 빌드
                const card = document.createElement('div');
                card.className = `room-card status-${info.status} ${currentSelectedRoom === roomNum ? 'selected' : ''}`;
                card.onclick = () => selectRoom(roomNum);

                card.innerHTML = `
                    <div class="room-header">
                        <span class="room-name">${roomNum}호</span>
                        <span class="status-badge">${badgeText}</span>
                    </div>
                    <div class="room-details">
                        <div><span>투숙 기간</span><span>${info.period.split('~')[0].trim() || '-'}</span></div>
                        <div><span>연락처</span><span>${info.phone !== '-' ? '등록됨' : '-'}</span></div>
                        <div><span>요금</span><span>${info.price.toLocaleString()}원</span></div>
                    </div>
                    <div class="room-btn-group">
                        <button onclick="event.stopPropagation(); changeRoomStatus('${roomNum}', 'available')">공실화</button>
                        <button onclick="event.stopPropagation(); changeRoomStatus('${roomNum}', 'dirty')">정비</button>
                    </div>
                `;
                container.appendChild(card);
            });

            // 요약 지표 업데이트 대입
            document.getElementById('count-occupied').innerHTML = `${countOccupied}<span> 실</span>`;
            document.getElementById('count-available').innerHTML = `${countAvailable}<span> 실</span>`;
            document.getElementById('count-dirty').innerHTML = `${countDirty}<span> 실</span>`;

            // 하단 현재 투숙 명단 테이블 렌더러
            const tbody = document.getElementById('live-guest-tbody');
            tbody.innerHTML = "";
            Object.keys(roomsData).forEach(roomNum => {
                const info = roomsData[roomNum];
                if(info.status === 'occupied') {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${roomNum}호</strong></td>
                        <td>${info.phone}</td>
                        <td>일 단위</td>
                        <td><span style="color:var(--success-color); font-weight:bold;">투숙중</span></td>
                        <td>${info.period}</td>
                        <td><button style="color:var(--danger-color); padding:2px 6px; font-size:0.8rem; cursor:pointer;" onclick="changeRoomStatus('${roomNum}', 'available')">퇴실/마감</button></td>
                    `;
                    tbody.appendChild(row);
                }
            });
        }

        // 특정 객실 마우스 클릭 선택 제어 동작 핸들러
        function selectRoom(roomNum) {
            currentSelectedRoom = roomNum;
            document.getElementById('selected-room-title').innerText = roomNum + "호";
            
            const info = roomsData[roomNum];
            document.getElementById('ctrl-phone').value = info.phone !== '-' ? info.phone : '';
            document.getElementById('ctrl-pwd').value = info.pwd;
            
            // 대시보드 카드 선택 스타일 즉시 새로고침 활성화
            renderDashboard();
        }

        // 상하단 간편 공실화/정비 변환 제어 핸들러
        function changeRoomStatus(roomNum, newStatus) {
            roomsData[roomNum].status = newStatus;
            if(newStatus !== 'occupied') {
                roomsData[roomNum].period = "-";
                roomsData[roomNum].phone = "-";
            }
            renderDashboard();
        }

        // 우측 패널 제어값 일괄 객실 인스턴스 갱신 및 입실 처리 버튼 스크립트
        function applyRoomControl() {
            if(!currentSelectedRoom) {
                alert("제어할 객실 카드를 먼저 마우스로 클릭해 선택해주세요.");
                return;
            }
            const phone = document.getElementById('ctrl-phone').value;
            const pwd = document.getElementById('ctrl-pwd').value;
            const start = document.getElementById('ctrl-start').value;
            const end = document.getElementById('ctrl-end').value;

            if(!phone || !start || !end) {
                alert("고객 연락처 및 투숙 지정 기간 일정을 입력해야 입실 처리가 완료됩니다.");
                return;
            }

            roomsData[currentSelectedRoom].status = "occupied";
            roomsData[currentSelectedRoom].phone = phone;
            roomsData[currentSelectedRoom].pwd = pwd;
            roomsData[currentSelectedRoom].period = `${start} ~ ${end}`;
            roomsData[currentSelectedRoom].price = 150000; // 가상 단가 세팅 고정화

            alert(`${currentSelectedRoom}호 입실 처리 및 도어락 매핑 수동 비밀번호가 원격 등록 완료되었습니다.`);
            renderDashboard();
        }

        // 초기 어플리케이션 구동 실행부 
        window.onload = function() {

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHA STAY | The Thermal Spa</title>
    <style>
        /* Shilla Stay Boutique Tone & Manner Design System */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        :root {
            --shilla-brown: #2B2523;      /* 신라스테이 특유의 도회적인 딥 브라운 */
            --shilla-gold: #BC9C6C;       /* 세련되고 은은한 무드의 시그니처 골드 */
            --shilla-bg: #F4F1EE;         /* 차분하고 고급스러운 오프화이트 배경 */
            --text-dark: #333333;
            --white: #ffffff;
            --border-line: rgba(43, 37, 35, 0.08);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--shilla-bg);
            color: var(--text-dark);
            line-height: 1.8;
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* Typography Customizing */
        .shilla-serif {
            font-family: 'Times New Roman', 'Didot', 'Cinzel', serif;
            letter-spacing: 0.15em;
        }

        /* Header Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(244, 241, 238, 0.92);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-line);
        }

        .brand-logo {
            text-align: left;
        }

        .brand-logo a {
            font-size: 20px;
            font-weight: 400;
            text-transform: uppercase;
            color: var(--shilla-brown);
            text-decoration: none;
            display: block;
            letter-spacing: 0.2em;
        }

        .brand-logo span {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--shilla-gold);
            letter-spacing: 0.35em;
            display: block;
            margin-top: 2px;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--shilla-brown);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            margin-right: 40px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--shilla-gold);
        }

        .btn-book-now {
            background-color: var(--shilla-brown);
            color: var(--white) !important;
            padding: 12px 30px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-right: 0;
            transition: background-color 0.3s;
        }

        .btn-book-now:hover {
            background-color: var(--shilla-gold);
            color: var(--white) !important;
        }

        /* Hero Visual Section */
        .hero-banner {
            height: 100vh;
            background: linear-gradient(rgba(43, 37, 35, 0.15), rgba(43, 37, 35, 0.25)), url('다운로드 (2).jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
        }

        .hero-banner h1 {
            font-size: 52px;
            font-weight: 300;
            text-transform: uppercase;
            margin-bottom: 12px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.15);
        }

        .hero-banner p {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--shilla-bg);
            text-shadow: 0 2px 10px rgba(0,0,0,0.15);
        }

        /* Container & Grid Setup */
        .shilla-container {
            max-width: 1260px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* Overview Section */
        .overview-wrap {
            text-align: center;
            padding: 120px 0;
            max-width: 800px;
            margin: 0 auto;
        }

        .sub-title-tag {
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--shilla-gold);
            margin-bottom: 25px;
            display: block;
            font-weight: 600;
        }

        .main-title {
            font-size: 34px;
            color: var(--shilla-brown);
            margin-bottom: 35px;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .desc-paragraph {
            font-size: 15px;
            color: #555555;
            line-height: 1.9;
            margin-bottom: 20px;
            word-break: keep-all;
        }

        /* Line Accent */
        .shilla-line {
            width: 40px;
            height: 1px;
            background-color: var(--shilla-gold);
            margin: 40px auto;
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 25px;
            margin-bottom: 100px;
        }

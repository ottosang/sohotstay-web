<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김박사의 운세풀이 연구소</title>
    <!-- Tailwind CSS 및 폰트 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;900&display=swap');
        .font-oriental { font-family: 'Noto Serif KR', serif; }
        .ball-shadow { box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), 3px 3px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 font-oriental min-h-screen flex items-center justify-center p-3 md:p-6">

    <!-- 메인 카드 -->
    <div class="w-full max-w-2xl bg-stone-800 rounded-3xl shadow-2xl border border-amber-950 p-6 md:p-10 relative overflow-hidden">
        
        <!-- 데코 레이어 -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-amber-700/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-stone-950 rounded-full blur-3xl"></div>

        <!-- 헤더 (김박사 프로필 및 타이틀) -->
        <div class="text-center mb-8 relative z-10 flex flex-col items-center">
            <div class="w-28 h-28 rounded-full overflow-hidden border-2 border-amber-500 shadow-xl mb-4 bg-stone-700">
                <!-- 이미지 파일 매핑 -->
                <img src="Gemini_Generated_Image_l3gtkul3gtkul3gt.png" alt="김박사 프로필" class="w-full h-full object-cover">
            </div>
            <h1 class="text-3xl md:text-4xl font-black text-amber-400 tracking-wide">김박사의 운세풀이</h1>
            <p class="text-xs text-stone-400 mt-1.5 tracking-widest uppercase">Dr. Kim's Saju & Dream Lab</p>
            <div class="w-24 h-[1px] bg-amber-600/40 mx-auto mt-4"></div>
        </div>

        <!-- 1. 입력 폼 섹션 -->
        <form id="fortuneForm" class="space-y-5 relative z-10">
            <div>
                <label class="block text-sm font-medium text-amber-300 mb-1">성명 (이름)</label>
                <input type="text" id="userName" required placeholder="한글 또는 한자 이름을 입력하세요" 
                       class="w-full bg-stone-700 border border-stone-600 rounded-xl px-4 py-3 text-stone-100 focus:outline-none focus:border-amber-500 transition text-sm">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-amber-300 mb-1">성별</label>
                    <select id="userGender" class="w-full bg-stone-700 border border-stone-600 rounded-xl px-4 py-3 text-stone-100 focus:outline-none focus:border-amber-500 text-sm">
                        <option value="남">남성 (男)</option>
                        <option value="여">여성 (女)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-amber-300 mb-1">음양력 선택</label>
                    <select id="calendarType" class="w-full bg-stone-700 border border-stone-600 rounded-xl px-4 py-3 text-stone-100 focus:outline-none focus:border-amber-500 text-sm">
                        <option value="양">양력</option>
                        <option value="음">음력 평달</option>
                        <option value="윤">음력 윤달</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-amber-300 mb-1">생년월일</label>
                    <input type="date" id="birthDate" required 
                           class="w-full bg-stone-700 border border-stone-600 rounded-xl px-4 py-3 text-stone-100 focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-amber-300 mb-1">출생 시간</label>
                    <select id="birthTime" class="w-full bg-stone-700 border border-stone-600 rounded-xl px-4 py-3 text-stone-100 focus:outline-none focus:border-amber-500 text-sm">
                        <option value="자">자시 (子時) : 23:30 ~ 01:30</option>
                        <option value="축">축시 (丑時) : 01:30 ~ 03:30</option>
                        <option value="인">인시 (寅時) : 03:30 ~ 05:30</option>
                        <option value="묘">묘시 (卯時) : 05:30 ~ 07:30</option>
                        <option value="진">진시 (辰時) : 07:30 ~ 09:30</option>
                        <option value="사">사시 (巳時) : 09:30 ~ 11:30</option>
                        <option value="오">오시 (午時) : 11:30 ~ 13:30</option>
                        <option value="미">미시 (未時) : 13:30 ~ 15:30</option>
                        <option value="신">신시 (申時) : 15:30 ~ 17:30</option>
                        <option value="유">유시 (酉時) : 17:30 ~ 19:30</option>
                        <option value="술">술시 (戌時) : 19:30 ~ 21:30</option>
                        <option value="해">해시 (亥時) : 21:30 ~ 23:30</option>
                    </select>
                </div>
            </div>

            <!-- 꿈 해몽 입력란 추가 -->
            <div>
                <label class="block text-sm font-medium text-amber-300 mb-1">🌙 최근에 꾼 기억나는 꿈 이야기 (선택)</label>
                <textarea id="dreamInput" rows="2" placeholder="예: 돼지가 방에 들어왔어요, 하늘을 날아다녔어요 등" 
                          class="w-full bg-stone-700 border border-stone-600 rounded-xl px-4 py-3 text-stone-100 placeholder-stone-500 focus:outline-none focus:border-amber-500 transition text-sm"></textarea>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-amber-600 to-amber-700 hover:from-amber-500 hover:to-amber-600 text-stone-900 font-black py-4 rounded-xl transition duration-300 shadow-lg tracking-widest text-base mt-2">
                김박사에게 운세 풀이 받기
            </button>
        </form>

        <!-- 2. 결과 출력 섹션 -->
        <div id="resultSection" class="hidden space-y-6 relative z-10">
            
            <!-- 상단 명판 -->
            <div class="p-4 bg-stone-900/60 rounded-2xl border border-stone-700 text-center">
                <span class="text-amber-400 font-bold text-lg" id="resName"></span>님의 명리 분석 보고서
                <p id="resSajuFour" class="text-amber-600 font-mono tracking-wider font-bold mt-1 text-sm"></p>
            </div>

            <!-- 오행 분석 -->
            <div class="bg-stone-700/40 p-5 rounded-2xl border border-stone-700">
                <h3 class="text-amber-300 font-bold text-base mb-3 flex items-center gap-2">📊 타고난 오행(五行) 분석</h3>
                <div class="space-y-2.5 mb-4" id="elementGraphContainer"></div>
                <p id="sajuDetailAnalysis" class="text-stone-300 leading-relaxed text-xs pt-2 border-t border-stone-600/50"></p>
            </div>

            <!-- 주역 대운 (종합/재물/연애/건강) -->
            <div class="bg-stone-700/40 p-5 rounded-2xl border border-stone-700 space-y-3">
                <h3 class="text-amber-300 font-bold text-base border-b border-stone-600/50 pb-2 flex items-center gap-2" id="juyeokGwaeTitle"></h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs text-stone-300">
                    <div class="bg-stone-900/40 p-3 rounded-xl border border-stone-800"><span class="font-bold text-amber-400 block mb-1">📜 금일 총평</span><p id="juyeokMain"></p></div>
                    <div class="bg-stone-900/40 p-3 rounded-xl border border-stone-800"><span class="font-bold text-yellow-500 block mb-1">💰 재물·비즈니스</span><p id="juyeokWealth"></p></div>
                    <div class="bg-stone-900/40 p-3 rounded-xl border border-stone-800"><span class="font-bold text-rose-400 block mb-1">❤️ 애정·대인관계</span><p id="juyeokLove"></p></div>
                    <div class="bg-stone-900/40 p-3 rounded-xl border border-stone-800"><span class="font-bold text-emerald-400 block mb-1">🩺 건강·처세 가이드</span><p id="juyeokHealth"></p></div>
                </div>
            </div>

            <!-- 꿈 해몽 결과 창 (꿈을 적었을 때만 동적으로 노출) -->
            <div id="dreamResultBox" class="hidden bg-purple-950/40 p-5 rounded-2xl border border-purple-900/60">
                <h3 class="text-purple-300 font-bold text-base mb-2 flex items-center gap-2">🌙 김박사의 영리(靈理) 꿈 해몽</h3>
                <p id="dreamAnalysis" class="text-stone-300 leading-relaxed text-xs"></p>
            </div>

            <!-- 로또 예측 요청 유도 영역 -->
            <div id="lottoRequestBox" class="p-4 bg-amber-950/30 rounded-2xl border border-amber-900/50 text-center space-y-3">
                <p class="text-xs text-stone-300">오늘 분석된 사주의 길한 기운(용신)을 모아 특수 보정된 로또 번호를 받아보시겠습니까?</p>
                <button onclick="revealLotto()" class="w-full bg-gradient-to-r from-yellow-600 to-amber-600 hover:from-yellow-500 hover:to-amber-500 text-stone-950 font-black py-2.5 rounded-xl transition text-sm shadow-md">
                    🍀 김박사의 천기누설 로또 번호 받기
                </button>
            </div>

            <!-- 실제 로또 출력 영역 (기본 숨김 -> 버튼 클릭시 오픈) -->
            <div id="lottoActualSection" class="hidden bg-gradient-to-b from-stone-900 to-stone-950 p-5 rounded-2xl border-2 border-amber-500/40 text-center animate-fade-in">
                <h4 class="text-stone-100 font-bold text-sm mb-3">오늘 오행 기운 보정 천기 번호</h4>
                <div id="lottoNumbers" class="flex justify-center flex-wrap gap-2.5 my-3"></div>
                <p id="lottoPrinciple" class="text-stone-400 text-[11px] bg-stone-800/50 p-2.5 rounded-lg text-left leading-normal"></p>
            </div>

            <!-- 제어 닫기 -->
            <button onclick="resetForm()" class="w-full bg-stone-700 hover:bg-stone-600 text-stone-300 font-semibold py-3 rounded-xl transition text-xs">
                ↩️ 다른 사람 운세 풀이하기
            </button>
        </div>

    </div>

    <!-- 스크립트 핵심 로직 -->
    <script>
        const sajuCoreEngine = [
            { element: "목(木)", color: "bg-green-600", text: "성장과 기획력", desc: "사주에 푸른 나무의 기운이 강합니다. 독립심과 기획력이 대단히 뛰어나며 인자한 성품입니다. 다만, 생각이 너무 확고해지면 고집이 될 수 있으니 유연성 있는 수용이 최고의 개운법입니다." },
            { element: "화(火)", color: "bg-red-600", text: "열정과 표현력", desc: "뜨거운 불꽃의 추진력을 품고 있습니다. 매사 확실하고 표현력이 훌륭하며 뒤끝이 없습니다. 다만 행동이 감정보다 앞설 수 있으니, 중요한 비즈니스에선 한 박자 쉬어가는 미덕이 필요합니다." },
            { element: "토(土)", color: "bg-yellow-600", text: "신용과 포용력", desc: "두터운 대지의 중재 능력을 가졌습니다. 신용을 최우선으로 여기며 주변을 안정적으로 감싸 안는 신뢰 형 인물입니다. 보수성이 강해질 수 있으니 과감한 도전 정신을 곁들이면 좋습니다." },
            { element: "금(金)", color: "bg-stone-400 text-stone-900", text: "의리와 결단력", desc: "단단한 바위나 정밀한 칼의 기운입니다. 결단력이 칼날 같고 의리가 깊습니다. 공과 사가 뚜렷해 차갑다는 인상을 주기 쉬우니 주변 사람의 감정을 먼저 읽어주는 포용이 길합니다." },
            { element: "수(水)", color: "bg-blue-600", text: "지혜와 임기응변", desc: "깊고 유연한 강물의 지혜를 담았습니다. 임기응변의 천재이며 두뇌 회전이 매우 빠릅니다. 과도한 고민은 행동을 늦추고 불안을 낳을 수 있으니 타고난 직관을 믿고 밀어붙이십시오." }
        ];

        const juyeokDetailedDb = [
            { title: "䷊ 지천태 (地天泰) - 상하화합", main: "하늘과 땅의 문이 열려 상하의 뜻이 온전히 소통하는 형국입니다. 막혔던 거래처나 대인관계가 자연스레 해소됩니다.", wealth: "문서운과 계약운이 따릅니다. 무리한 확장보다는 계약 조건 조율에 신경 쓰면 이득이 큽니다.", love: "갈등이 있었다면 대화로 깔끔하게 풀립니다. 소개팅이나 새로운 인연에도 아주 길한 날입니다.", health: "기혈 순환이 우수합니다. 평소 불편했던 곳의 컨디션이 회복세로 돌아섭니다." },
            { title: "䷍ 화천대유 (火天大有) - 만천하 광명", main: "하늘 위에 태양이 높이 떠 온 세상을 비추니 내 명예와 능력이 사람들에게 높이 평가받는 전성기적 대운입니다.", wealth: "금전 회전이 최고조에 달합니다. 밀렸던 수금이나 투자 자금의 유입에 청신호가 켜집니다.", love: "나의 매력이 빛나는 시기라 인기가 따릅니다. 솔직하고 자신감 있는 태도가 매력을 더합니다.", health: "활력이 넘치나 눈의 피로나 심장 두근거림 등 과로로 인한 증상만 조금 조심하면 좋습니다." },
            { title: "䷎ 지산겸 (地山謙) - 덕망겸양", main: "거대한 산이 대지 아래로 스스로를 낮춘 격입니다. 앞장서서 고집하기보다는 한 걸음 양보할 때 실익이 훨씬 큽니다.", wealth: "공격적인 지출이나 과감한 투자는 보류하십시오. 현금 자산을 확보하고 내실을 다질 때입니다.", love: "상대방의 입장을 먼저 지지해 주면 관계의 주도권이 역설적으로 나에게 넘어오게 됩니다.", health: "어깨, 척추 부위의 뻐근함을 조심하고 스트레칭을 자주 해주는 것이 좋습니다." }
        ];

        const elementLottoMap = {
            "목(木)": [1, 6, 11, 16, 21, 26, 31, 36, 41], "화(火)": [2, 7, 12, 17, 22, 27, 32, 37, 42],
            "토(土)": [5, 10, 15, 20, 25, 30, 35, 40, 45], "금(金)": [4, 9, 14, 19, 24, 29, 34, 39, 44], "수(Water)": [3, 8, 13, 18, 23, 28, 33, 38, 43]
        };

        // 폼 제출 프로세스
        document.getElementById('fortuneForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('userName').value;
            const gender = document.getElementById('userGender').value;
            const birthDate = document.getElementById('birthDate').value;
            const birthTime = document.getElementById('birthTime').value;
            const dreamText = document.getElementById('dreamInput').value.trim();

            let nameScore = 0; for(let i=0; i<name.length; i++) { nameScore += name.charCodeAt(i); }
            const dateNum = parseInt(birthDate.replace(/-/g, '')) || 19900101;
            const seed = nameScore + dateNum;

            // 만세력 가상 표기
            const yrC = ["甲子","乙丑","丙寅","丁卯","戊辰"][seed%5];
            const dyC = ["庚午","辛未","壬申","癸酉","己卯"][seed%5];
            document.getElementById('resSajuFour').innerText = `元局 - [年柱: ${yrC}] [日柱: ${dyC}] [出StartTime: ${birthTime}時]`;

            // 오행 비율 분배 계산 및 그래프 출력
            let counts = [3, 2, 1, 1, 1]; 
            let maxElementIdx = seed % 5;
            counts[maxElementIdx] = 4; // 시드에 맞춰 메인 오행 부각

            const graphContainer = document.getElementById('elementGraphContainer');
            graphContainer.innerHTML = '';
            
            sajuCoreEngine.forEach((targetOheng, i) => {
                const count = counts[i];
                const percentage = Math.round((count / 9) * 100);
                const row = document.createElement('div');
                row.className = "flex items-center text-xs";
                row.innerHTML = `
                    <span class="w-14 font-bold text-amber-200 text-xs">${targetOheng.element}</span>
                    <div class="flex-1 bg-stone-800 rounded-full h-3.5 mx-2 overflow-hidden border border-stone-600">
                        <div class="${targetOheng.color.split(' ')[0]} h-full rounded-full" style="width: ${percentage}%"></div>
                    </div>
                    <span class="w-12 text-right font-mono text-amber-400 font-bold">${count}개(${percentage}%)</span>
                `;
                graphContainer.appendChild(row);
            });

            document.getElementById('resName').innerText = name;
            document.getElementById('sajuDetailAnalysis').innerText = `김박사 소견으로, 귀하는 선천적으로 [${sajuCoreEngine[maxElementIdx].element}] 기운의 지배를 강하게 받습니다. 성향적으로 '${sajuCoreEngine[maxElementIdx].text}' 특성이 강하게 발현됩니다. ${sajuCoreEngine[maxElementIdx].desc}`;

            // 주역 풀이
            const todayStr = new Date().toISOString().slice(0,10).replace(/-/g, '');
            const juyeokIdx = (seed + parseInt(todayStr)) % juyeokDetailedDb.length;
            const targetJuyeok = juyeokDetailedDb[juyeokIdx];
            document.getElementById('juyeokGwaeTitle').innerText = `☯️ 오늘의 주역 괘: ${targetJuyeok.title}`;
            document.getElementById('juyeokMain').innerText = targetJuyeok.main;
            document.getElementById('juyeokWealth').innerText = targetJuyeok.wealth;
            document.getElementById('juyeokLove').innerText = targetJuyeok.love;
            document.getElementById('juyeokHealth').innerText = targetJuyeok.health;

            // 🌙 핵심 꿈 해몽 엔진 작동부
            const dreamBox = document.getElementById('dreamResultBox');
            if (dreamText.length > 0) {
                dreamBox.classList.remove('hidden');
                let dreamInterpretation = "입력하신 꿈은 무의식이 보내는 잔잔한 심리적 투영입니다. 마음을 차분히 먹고 현실의 일에 집중하시면 점차 안정을 찾을 조짐입니다.";
                
                // 엔진 키워드 스캐닝
                if(dreamText.includes("돼지") || dreamText.includes("돈") || dreamText.includes("똥") || dreamText.includes("보석")) {
                    dreamInterpretation = `귀하가 꾸신 꿈은 전형적인 '재물 확장형 길몽'입니다. 현재 사주의 [${sajuCoreEngine[maxElementIdx].element}] 기운과 조화를 이루어, 예상치 못한 횡재수나 비즈니스 영역에서의 계약 성사, 금전적 이득이 들어올 강한 암시를 줍니다. 가치가 높은 일에 도전해 보세요.`;
                } else if(dreamText.includes("물") || dreamText.includes("바다") || dreamText.includes("홍수")) {
                    dreamInterpretation = "물은 동양 철학에서 '지혜와 재화'의 흐름을 상징합니다. 감당하기 힘든 파도가 아니었다면 조만간 큰 지식적 성취나 세력 확장의 기회가 다가옴을 김박사가 보증합니다.";
                } else if(dreamText.includes("싸움") || dreamText.includes("도망") || dreamText.includes("죽음") || dreamText.includes("피")) {
                    dreamInterpretation = "피를 흘리거나 죽는 꿈은 역학에서 역설적으로 '낡은 허물을 벗고 새롭게 재생함'을 뜻하는 대길몽에 가깝습니다. 정체되었던 운의 활로가 트일 변곡점입니다.";
                }
                document.getElementById('dreamAnalysis').innerText = dreamInterpretation;
            } else {
                dreamBox.classList.add('hidden');
            }

            // 로또 로직 미리 사전 계산 (노출은 안 시킴)
            window.calculatedLotto = function() {
                const luckyPool = elementLottoMap[sajuCoreEngine[maxElementIdx].element] || [7, 14, 21, 28, 35, 42];
                let nums = [];
                while(nums.length < 2) {
                    let p = luckyPool[Math.floor(Math.random() * luckyPool.length)];
                    if(!nums.includes(p)) nums.push(p);
                }
                while(nums.length < 6) {
                    let p = Math.floor(Math.random() * 45) + 1;
                    if(!nums.includes(p)) nums.push(p);
                }
                nums.sort((a,b)=>a-b);

                const container = document.getElementById('lottoNumbers'); container.innerHTML = '';
                nums.forEach(num => {
                    const ball = document.createElement('div');
                    ball.className = "w-10 h-10 flex items-center justify-center font-black rounded-full text-white text-xs ball-shadow border border-white/20";
                    if(num <= 10) ball.className += " bg-gradient-to-br from-amber-400 to-yellow-500 text-stone-900";
                    else if(num <= 20) ball.className += " bg-gradient-to-br from-blue-400 to-blue-600";
                    else if(num <= 30) ball.className += " bg-gradient-to-br from-red-400 to-red-600";
                    else if(num <= 40) ball.className += " bg-gradient-to-br from-stone-400 to-stone-600";
                    else ball.className += " bg-gradient-to-br from-emerald-400 to-emerald-600";
                    ball.innerText = num; container.appendChild(ball);
                });
                document.getElementById('lottoPrinciple').innerText = `본 숫자는 김박사 명리 엔진에 의해 추출된 귀하의 수호 오행인 [${sajuCoreEngine[maxElementIdx].element}] 기반 고유 파동 수입니다. 무작위 난수가 아닌 선천 기운 보정 방식이므로 긍정적인 마음으로 활용해 보시기 바랍니다.`;
            };

            // 초기 로또 요청 유도창 리셋
            document.getElementById('lottoRequestBox').classList.remove('hidden');
            document.getElementById('lottoActualSection').classList.add('hidden');

            // 화면 전환
            document.getElementById('fortuneForm').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // 사용자가 로또 번호 보기 클릭 시 실행
        function revealLotto() {
            window.calculatedLotto(); // 번호 생성
            document.getElementById('lottoRequestBox').classList.add('hidden'); // 안내 박스 숨김
            const actualSec = document.getElementById('lottoActualSection');
            actualSec.classList.remove('hidden'); // 실제 구체 노출
            
            // 번호 위치로 부드럽게 스크롤
            setTimeout(() => {
                actualSec.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function resetForm() {
            document.getElementById('fortuneForm').reset();
            document.getElementById('fortuneForm').classList.remove('hidden');
            document.getElementById('resultSection').classList.add('hidden');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심리 테스트 RPG: 나의 부캐 찾기</title>
    <style>
        /* 레트로 게임 감성 스타일링 */
        @import url('https://fonts.googleapis.com/css2?family=DungGeunMo&display=swap');

        body {
            font-family: 'DungGeunMo', 'Malgun Gothic', sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            width: 400px;
            height: 600px;
            background-color: #16213e;
            border: 4px solid #e94560;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        h1 { font-size: 24px; color: #e94560; margin-bottom: 10px; }
        p { font-size: 16px; line-height: 1.5; color: #eee; }

        /* 캐릭터 애니메이션 효과 */
        .character {
            font-size: 70px;
            margin: 20px 0;
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .character.think {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        /* 버튼 래퍼 및 스타일 */
        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            background-color: #0f3460;
            color: white;
            border: 2px solid #e94560;
            padding: 15px;
            font-size: 16px;
            font-family: 'DungGeunMo', sans-serif;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #e94560;
            transform: scale(1.03);
        }

        /* 경험치 바 (프로그레스 바) */
        .exp-bar-container {
            width: 100%;
            background-color: #0f3460;
            border: 2px solid #e94560;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .exp-bar {
            width: 0%;
            height: 100%;
            background-color: #e94560;
            transition: width 0.3s ease;
        }

        /* 결과 창 스탯 스타일 */
        .stat-box {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            width: 90%;
            font-size: 14px;
            text-align: left;
            border: 1px dashed #e94560;
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <div id="intro-screen" class="screen active">
            <h1>나의 부캐 찾기 RPG</h1>
            <div class="character">🕹️</div>
            <p>당신의 연령대를 선택하여<br>맞춤형 모험을 시작하세요!</p>
            <div class="btn-container">
                <button onclick="startGame('junior')">새싹 모험가 (청소년)</button>
                <button onclick="startGame('adult')">프로 모험가 (성인)</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="exp-bar-container">
                <div id="exp-bar" class="exp-bar"></div>
            </div>
            <div id="char-avatar" class="character think">🤔</div>
            <p id="question-text">질문 텍스트가 들어가는 곳</p>
            <div class="btn-container">
                <button id="ans-a" onclick="selectAnswer('A')">선택지 A</button>
                <button id="ans-b" onclick="selectAnswer('B')">선택지 B</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h1>모험 완료! 당신의 부캐는?</h1>
            <div id="result-emoji" class="character" style="animation: bounce 0.4s infinite alternate;">🧙‍♂️</div>
            <h2 id="result-title" style="color: #e94560;">유형 이름</h2>
            <div class="stat-box">
                <p id="result-desc">유형 설명이 들어가는 곳</p>
                <p id="result-item" style="color:#ffae42; font-weight:bold;"></p>
            </div>
            <div class="btn-container">
                <button onclick="restartGame()">다시 모험 떠나기 🔁</button>
            </div>
        </div>

    </div>

    <script>
        // --- 게임 데이터 구성 ---
        const questions = {
            junior: [
                { q: "새 학기 첫날, 교실에 들어갔을 때 나의 행동은?", a: "짝꿍에게 먼저 말을 걸며 통성명을 한다", b: "조용히 빈자리에 앉아 분위기를 살핀다", type: "EI" },
                { q: "선생님이 전설의 보물섬 이야기를 해주신다면?", a: "보물섬에 갈 상상을 하며 가슴이 뛴다", b: "교과서 어디에 나오는 내용인지 확인한다", type: "SN" } // 예시를 위해 단순화(원래 N/S 축)
            ],
            adult: [
                { q: "금요일 퇴근 길! 주말을 앞둔 당신의 선택은?", a: "친구들에게 연락해 당장 번개를 잡는다", b: "집으로 직행해 넷플릭스 켤 준비를 한다", type: "EI" },
                { q: "친구가 갑자기 '나 너무 우울해서 빵 샀어' 라고 한다면?", a: "왜 우울해? 무슨 일 있었어? (토닥토닥)", b: "무슨 빵 샀는데? 맛있어?", type: "TF" }
            ]
        };

        const results = {
            "E": { title: "에너지 폭발 마법사", emoji: "🧙‍♂️", desc: "사람들과 함께 있을 때 마나가 마르지 않는 활동가 유형입니다!", item: "추천 장비: 확성기 지팡이" },
            "I": { title: "철벽 방어 은둔 기사", emoji: "🛡️", desc: "혼자만의 요새에서 에너지를 충전하는 내실 탄탄한 유형입니다!", item: "추천 장비: 쥐구멍 망토" }
        };

        // --- 게임 상태 변수 ---
        let currentAgeGroup = 'adult';
        let currentIdx = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0 };

        // --- 게임 로직 제어 ---
        function startGame(ageGroup) {
            currentAgeGroup = ageGroup;
            currentIdx = 0;
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0 };
            
            switchScreen('intro-screen', 'game-screen');
            showQuestion();
        }

        function showQuestion() {
            const qList = questions[currentAgeGroup];
            
            // 경험치 바 업데이트
            const progress = (currentIdx / qList.length) * 100;
            document.getElementById('exp-bar').style.width = `${progress}%`;

            if (currentIdx >= qList.length) {
                showResult();
                return;
            }

            const qData = qList[currentIdx];
            document.getElementById('question-text').innerText = qData.q;
            document.getElementById('ans-a').innerText = qData.a;
            document.getElementById('ans-b').innerText = qData.b;
            
            // 질문 바뀔 때 캐릭터 에니메이션 변경 (고민 중...)
            const char = document.getElementById('char-avatar');
            char.innerText = "🤔";
            char.className = "character think";
        }

        function selectAnswer(choice) {
            const qData = questions[currentAgeGroup][currentIdx];
            const typePair = qData.type; // 예: "EI"
            
            // 단순 구현을 위해 첫 질문의 A는 앞글자(E), B는 뒷글자(I)로 계산
            if (choice === 'A') {
                scores[typePair[0]]++;
            } else {
                scores[typePair[1]]++;
            }

            currentIdx++;
            showQuestion();
        }

        function showResult() {
            switchScreen('game-screen', 'result-screen');
            
            // 가장 점수가 높은 지표로 임시 결과 산출 (E vs I 위주)
            let finalType = scores.E >= scores.I ? "E" : "I";
            const resultData = results[finalType];

            document.getElementById('result-emoji').innerText = resultData.emoji;
            document.getElementById('result-title').innerText = resultData.title;
            document.getElementById('result-desc').innerText = resultData.desc;
            document.getElementById('result-item').innerText = resultData.item;
        }

        function restartGame() {
            switchScreen('result-screen', 'intro-screen');
        }

        function switchScreen(hideId, showId) {
            document.getElementById(hideId).classList.remove('active');
            document.getElementById(showId).classList.add('active');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전통 역학 & 주역 운세</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Serif KR', serif; }
    </style>
</head>
<body class="bg-amber-50 text-stone-900 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-xl bg-white rounded-2xl shadow-xl border border-amber-100 p-6 md:p-8">
        <h1 class="text-3xl font-bold text-center text-amber-800 mb-2">☯️ 명리 & 주역 운세</h1>
        <p class="text-center text-sm text-stone-500 mb-8">당신의 타고난 기운과 오늘의 하늘의 뜻을 읽어드립니다.</p>

        <form id="fortuneForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-1">이름 (한자 또는 한글)</label>
                <input type="text" id="userName" required placeholder="예: 洪吉童 또는 홍길동" 
                       class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">성별</label>
                    <select id="userGender" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600">
                        <option value="남">남성</option>
                        <option value="여">여성</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">음양력</label>
                    <select id="calendarType" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600">
                        <option value="양">양력</option>
                        <option value="음">음력 (평달)</option>
                        <option value="윤">음력 (윤달)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">생년월일</label>
                    <input type="date" id="birthDate" required 
                           class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">태어난 시간 (시)</label>
                    <select id="birthTime" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600">
                        <option value="자">자시 (23시~01시)</option>
                        <option value="축">축시 (01시~03시)</option>
                        <option value="인">인시 (03시~05시)</option>
                        <option value="묘">묘시 (05시~07시)</option>
                        <option value="진">진시 (07시~09시)</option>
                        <option value="사">사시 (09시~11시)</option>
                        <option value="오">오시 (11시~13시)</option>
                        <option value="미">미시 (13시~15시)</option>
                        <option value="신">신시 (15시~17시)</option>
                        <option value="유">유시 (17시~19시)</option>
                        <option value="술">술시 (19시~21시)</option>
                        <option value="해">해시 (21시~23시)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-amber-800 hover:bg-amber-900 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">
                천기누설 운세 보기
            </button>
        </form>

        <div id="resultSection" class="hidden mt-8 border-t-2 border-dashed border-amber-200 pt-6 space-y-6">
            <h2 class="text-2xl font-bold text-center text-amber-900"><span id="resName"></span>님의 명리 분석</h2>
            
            <div class="p-4 bg-amber-50 rounded-xl">
                <h3 class="font-bold text-amber-800 mb-2">🔮 타고난 성향 (오행 기운)</h3>
                <p id="sajuAnalysis" class="text-stone-700 leading-relaxed text-sm"></p>
            </div>

            <div class="p-4 bg-stone-50 rounded-xl border border-stone-200">
                <h3 class="font-bold text-stone-800 mb-1">☯️ 오늘의 주역 괘 풀이</h3>
                <div id="juyeokGwae" class="text-xl font-bold text-amber-700 my-1"></div>
                <p id="juyeokAnalysis" class="text-stone-700 leading-relaxed text-sm"></p>
            </div>

            <div class="p-4 bg-amber-900 text-white rounded-xl text-center">
                <h3 class="font-bold text-amber-200 mb-3">🍀 오늘 오행의 기운을 담은 추천 로또 번호</h3>
                <div id="lottoNumbers" class="flex justify-center gap-2 font-bold text-lg">
                    </div>
                <p class="text-xs text-amber-300/80 mt-2">※ 본인의 사주 상 길한 숫자를 조합하여 보정한 번호입니다.</p>
            </div>

            <button onclick="resetForm()" class="w-full bg-stone-200 hover:bg-stone-300 text-stone-700 font-semibold py-2 rounded-lg text-sm transition">
                다른 운세 보기
            </button>
        </div>
    </div>

    <script>
        // 프론트엔드 시뮬레이션을 위한 데이터 셋트
        const juyeokDb = [
            { gwae: "䷊ 지천태(地天泰)", desc: "하늘과 땅의 기운이 화합하니 평화롭고 번창하는 시기입니다. 계획한 일이 있다면 과감하게 추진하세요." },
            { gwae: "䷍ 화천대유(火天大有)", desc: "하늘 위에 해가 높이 떠 세상을 비추는 형상입니다. 큰 재물운과 명예가 따르니 주변과 베풀며 전진하십시오." },
            { gwae: "䷎ 지산겸(地山謙)", desc: "높은 산이 땅 아래 엎드려 있는 형상으로, 스스로 낮출 때 가장 안전하고 이득이 큽니다. 겸손이 무기입니다." },
            { gwae: "䷵ 뇌택귀매(雷澤歸妹)", desc: "순서가 뒤바뀌거나 마음이 앞서 실수를 할 수 있는 날입니다. 급하게 계약하거나 추진하지 말고 한 걸음 물러서세요." },
            { gwae: "䷁ 중지곤(重地坤)", desc: "넓은 대지처럼 포용하고 수용하는 자세가 필요합니다. 주도하기보다는 타인의 뜻을 따르는 것이 이롭습니다." }
        ];

        const sajuTexts = [
            "따뜻하고 열정적인 '화(火)'의 기운을 강하게 타고나셨습니다. 언변이 좋고 추진력이 뛰어나나, 가끔 성급해질 수 있으니 차분함을 유지하는 것이 좋습니다.",
            "굳건하고 안정적인 '토(土)'의 기운이 중심을 잡고 있습니다. 신용을 중시하며 타인을 포용하는 능력이 뛰어납니다. 내실을 다지기에 좋은 사주입니다.",
            "단단하고 결단력 있는 '금(金)'의 기운이 빛을 발합니다. 정의롭고 맺고 끊음이 확실하지만, 때로는 융통성을 발휘하는 것이 인간관계에 이롭습니다.",
            "끊임없이 흐르고 지혜로운 '수(水)'의 기운을 담고 있습니다. 임기응변에 강하고 생각이 깊으나, 지나친 고민은 행동을 더디게 할 수 있으니 직관을 믿으세요.",
            "생명력 있고 뻗어 나가는 '목(木)'의 기운이 지배적입니다. 기획력이 좋고 온정적이나, 자존심이 다치면 쉽게 꺾일 수 있으니 유연성을 기르는 것이 좋습니다."
        ];

        // 오행별 추천 행운의 숫자 매핑
        const luckyNumbersByElement = [
            [2, 7, 12, 17, 22, 27, 32, 37, 42], // 화
            [5, 10, 15, 20, 25, 30, 35, 40, 45], // 토
            [4, 9, 14, 19, 24, 29, 34, 39, 44], // 금
            [3, 8, 13, 18, 23, 28, 33, 38, 43], // 수
            [1, 6, 11, 16, 21, 26, 31, 36, 41]  // 목
        ];

        document.getElementById('fortuneForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('userName').value;
            const birthDate = document.getElementById('birthDate').value;
            
            // 1. 단순 해시 메커니즘을 위한 숫자 변환 (이름 글자수 + 생일 조합)
            // 실제 서비스에서는 여기에 만세력 계산 백엔드 API가 들어가야 합니다.
            const seed = name.length + parseInt(birthDate.replace(/-/g, '')) || 777;

            // 2. 사주 성향 결정 (Seed 기반 결정)
            const sajuIndex = seed % sajuTexts.length;
            document.getElementById('resName').innerText = name;
            document.getElementById('sajuAnalysis').innerText = sajuTexts[sajuIndex];

            // 3. 주역 괘 결정 (오늘 날짜 + Seed 조합으로 매일 바뀌게 설정)
            const todayStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            const juyeokIndex = (seed + parseInt(todayStr)) % juyeokDb.length;
            document.getElementById('juyeokGwae').innerText = juyeokDb[juyeokIndex].gwae;
            document.getElementById('juyeokAnalysis').innerText = juyeokDb[juyeokIndex].desc;

            // 4. 오행 보정 로또 번호 생성
            // 해당 사주 오행의 행운의 숫자 풀에서 2개를 고정 추출하고, 나머지는 1~45 중 랜덤 추출
            const basePool = luckyNumbersByElement[sajuIndex];
            let lottoResult = [];
            
            // 행운의 숫자 풀에서 2개 무작위 선택
            while(lottoResult.length < 2) {
                let num = basePool[Math.floor(Math.random() * basePool.length)];
                if(!lottoResult.includes(num)) lottoResult.push(num);
            }

            // 나머지 4개 번호 일반 추출 (중복 제거)
            while(lottoResult.length < 6) {
                let num = Math.floor(Math.random() * 45) + 1;
                if(!lottoResult.includes(num)) lottoResult.push(num);
            }

            // 오름차순 정렬
            lottoResult.sort((a, b) => a - b);

            // 로또 UI 렌더링
            const lottoContainer = document.getElementById('lottoNumbers');
            lottoContainer.innerHTML = '';
            lottoResult.forEach(num => {
                const ball = document.createElement('span');
                ball.className = "w-10 h-10 flex items-center justify-center bg-amber-600 text-white font-bold rounded-full border-2 border-amber-400 shadow-sm";
                // 로또 번호 대역별 색상 구분 효과 (선택사항)
                if(num <= 10) ball.className += " bg-yellow-500 text-stone-900";
                else if(num <= 20) ball.className += " bg-blue-600";
                else if(num <= 30) ball.className += " bg-red-600";
                else if(num <= 40) ball.className += " bg-gray-600";
                else ball.className += " bg-green-600";
                
                ball.innerText = num;
                lottoContainer.appendChild(ball);
            });

            // 화면 전환
            document.getElementById('fortuneForm').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
        });

        function resetForm() {
            document.getElementById('fortuneForm').reset();
            document.getElementById('fortuneForm').classList.remove('hidden');
            document.getElementById('resultSection').classList.add('hidden');
        }
    </script>
</body>
</html>
